name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    env:
      BUILD_CONFIG: Release
      SOLUTION: Sia.slnx
      EXAMPLES_PROJECT: Sia.Examples/Sia.Examples.Browser.csproj
      PUBLISH_OUTPUT: ${{ github.workspace }}/artifacts/examples

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore WebAssembly workload
        run: dotnet workload restore "$EXAMPLES_PROJECT"

      - name: Restore solution
        run: dotnet restore "$SOLUTION"

      - name: Restore browser examples
        run: dotnet restore "$EXAMPLES_PROJECT"

      - name: Build solution
        run: dotnet build "$SOLUTION" --configuration "$BUILD_CONFIG" --no-restore

      - name: Publish browser examples
        run: >
          dotnet publish "$EXAMPLES_PROJECT"
          --configuration "$BUILD_CONFIG"
          --no-restore
          -p:PublishDir="$PUBLISH_OUTPUT/"

      - name: Prepare Pages artifact
        run: touch "$PUBLISH_OUTPUT/wwwroot/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PUBLISH_OUTPUT }}/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
