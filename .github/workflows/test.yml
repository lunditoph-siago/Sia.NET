name: Test

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore Sia.Tests/Sia.Tests.csproj

      - name: Run tests
        run: dotnet test Sia.Tests/Sia.Tests.csproj --configuration Release --blame-hang --blame-hang-timeout 5m
